name: Lint and Vitest Tests
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - .gitignore
      - LICENSE
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - .gitignore
      - LICENSE

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  tests:
    strategy:
      fail-fast: false
      matrix:
        suite: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: "npm"
      - run: npm ci
      - run: npm run test:${{ matrix.suite }}